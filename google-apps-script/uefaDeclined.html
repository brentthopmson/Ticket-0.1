<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f9; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { background-color: #cc0000; background-image: linear-gradient(135deg, #800000 0%, #cc0000 100%); padding: 40px 20px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; text-transform: uppercase; }
        .body { padding: 40px 30px; color: #333333; line-height: 1.6; }
        .greeting { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #800000; }
        .info-box { background-color: #fff5f5; border: 1px solid #fed7d7; border-radius: 12px; padding: 25px; margin: 30px 0; }
        .footer { padding: 30px; text-align: center; font-size: 12px; color: #999999; background-color: #fafafa; border-top: 1px solid #eeeeee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Transfer Declined</h1>
        </div>
        <div class="body">
            <p class="greeting">Hello,</p>
            <p>This is to confirm that you have declined the ticket transfer for <strong><?= templateData.eventName ?></strong>.</p>
            
            <div class="info-box">
                <p style="margin: 0;">The tickets have been returned to the sender. If this was a mistake, please contact the sender: <strong><?= templateData.senderName ?></strong> to initiate a new transfer.</p>
            </div>
        </div>
        <div class="footer">
            <p>&copy; 2026 UEFA. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
