<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        .container { max-width: 600px; margin: 20px auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; }
        .header { background-color: #001B41; padding: 30px; text-align: center; }
        .header img { height: 35px; }
        .body { padding: 40px; text-align: center; color: #001B41; }
        .success-circle { width: 80px; height: 80px; background-color: #89CF28; color: white; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 25px; }
        .title { font-size: 28px; font-weight: 900; margin-bottom: 15px; }
        .event-details { background-color: #f8f9fa; border-radius: 12px; padding: 25px; margin: 25px 0; }
        .event-name { font-weight: 800; font-size: 20px; margin-bottom: 5px; }
        .footer { padding: 30px; font-size: 12px; color: #777; background-color: #fafafa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><img src="https://www.viagogo.com/static/images/viagogo-logo-v2.svg" alt="viagogo"></div>
        <div class="body">
            <div class="success-circle">✓</div>
            <h1 class="title">Transfer Accepted!</h1>
            <p>You've successfully accepted your tickets. Get ready for an amazing event!</p>
            <div class="details-box">
                <p class="event-name"><?= templateData.eventName ?></p>
                <p><?= templateData.venue ?></p>
            </div>
            <p>Your tickets are now available in your viagogo account. Enjoy the event!</p>
        </div>
        <div class="footer"><p>© 2026 viagogo. All rights reserved.</p></div>
    </div>
</body>
</html>
