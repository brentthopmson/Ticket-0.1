<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        .container { max-width: 600px; margin: 20px auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; }
        .header { background-color: #001B41; padding: 30px; text-align: center; }
        .header img { height: 35px; }
        .body { padding: 40px; color: #001B41; }
        .title { font-size: 28px; font-weight: 900; color: #e74c3c; margin-bottom: 20px; }
        .info-box { background-color: #fff5f5; border: 1px solid #ff0000; border-radius: 12px; padding: 25px; margin: 25px 0; }
        .footer { padding: 30px; font-size: 12px; color: #777; background-color: #fafafa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><img src="https://www.viagogo.com/static/images/viagogo-logo-v2.svg" alt="viagogo"></div>
        <div class="body">
            <h1 class="title">Transfer Declined</h1>
            <p>You have declined the ticket transfer for <strong><?= templateData.eventName ?></strong>.</p>
            <div class="info-box">
                <p style="margin:0;">The tickets have been returned to the sender. If you believe this was an error, please reach out to the sender directly to request a new transfer.</p>
            </div>
        </div>
        <div class="footer"><p>© 2026 viagogo. All rights reserved.</p></div>
    </div>
</body>
</html>
